<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plants vs Zombies HTML5 Game</title>
    <style>
        body {
            margin: 0;
            background: #d3d3d3;
            font-family: Arial, sans-serif;
        }
        #game {
            margin: auto;
            width: 900px;
            height: 600px;
            position: relative;
            border: 1px solid #333;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(5, 1fr);
            height: 100%;
            width: 100%;
        }
        .cell {
            border: 1px solid #aaa;
            box-sizing: border-box;
            position: relative;
        }
        .plant {
            position: absolute;
            bottom: 0;
        }
        .zombie {
            position: absolute;
            top: 0;
            transition: left 0.1s;
        }
        /* Additional styles for each plant type and projectiles */
        /* ... Add styles for plants and projectiles ... */
    </style>
</head>
<body>
    <div id="game">
        <div class="grid">
            <!-- Cells for grid -->
        </div>
        <div id="sun-counter">Suns: <span id="sun-count">0</span></div>
    </div>
    <script>
        const sunGeneratorInterval = 10000; // 10 seconds
        let sunCount = 0;
        const sunGenerationAmount = 25;
        const sunGenerationElement = document.getElementById('sun-count');

        setInterval(() => {
            sunCount += sunGenerationAmount;
            sunGenerationElement.textContent = sunCount;
        }, sunGeneratorInterval);

        function addPlant(type, cell) {
            const plant = document.createElement('div');
            plant.classList.add('plant', type);
            cell.appendChild(plant);
        }

        function addZombie(cell) {
            const zombie = document.createElement('div');
            zombie.classList.add('zombie');
            cell.appendChild(zombie);
            moveZombie(zombie, cell);
        }

        function moveZombie(zombie, cell) {
            let leftPosition = 0;
            const zombieSpeed = 5;
            const interval = setInterval(() => {
                leftPosition += zombieSpeed;
                zombie.style.left = `${leftPosition}px`;
                if (leftPosition >= cell.offsetWidth) {
                    clearInterval(interval);
                    cell.removeChild(zombie);
                }
            }, 100);
        }

        // Initialize game grid
        const grid = document.querySelector('.grid');
        for (let i = 0; i < 9 * 5; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            grid.appendChild(cell);
        }

        // Game mechanics such as waves and interactions will go here
        // ... Additional game code ... 
    </script>
</body>
</html>
