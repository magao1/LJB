<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 - Battle City</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            gap: 20px;
            background: #222;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #gameCanvas {
            border: 3px solid #4CAF50;
            background: #000;
            display: block;
        }

        .info-panel {
            width: 200px;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .info-section {
            background: #333;
            padding: 15px;
            border-radius: 4px;
            border-left: 4px solid #4CAF50;
        }

        .info-section h3 {
            color: #4CAF50;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .info-section p {
            font-size: 14px;
            line-height: 1.8;
            color: #ddd;
        }

        .controls {
            background: #333;
            padding: 15px;
            border-radius: 4px;
            border-left: 4px solid #FF9800;
        }

        .controls h3 {
            color: #FF9800;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .controls p {
            font-size: 12px;
            line-height: 1.6;
            color: #ddd;
            margin-bottom: 5px;
        }

        .status {
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }

        .status.playing {
            background: #4CAF50;
            color: #fff;
        }

        .status.gameover {
            background: #f44336;
            color: #fff;
        }

        .status.victory {
            background: #2196F3;
            color: #fff;
        }

        @media (max-width: 1200px) {
            .game-container {
                flex-direction: column;
                width: 90%;
            }

            .info-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="520" height="520"></canvas>
        <div class="info-panel">
            <div class="info-section">
                <h3>🎮 游戏信息</h3>
                <p>关卡: <span id="level">1</span></p>
                <p>生命: <span id="life">3</span></p>
                <p>消灭敌坦克: <span id="score">0/3</span></p>
                <p>剩余敌坦克: <span id="enemies">3</span></p>
            </div>

            <div class="info-section">
                <h3>📊 游戏状态</h3>
                <div class="status playing" id="status">进行中</div>
            </div>

            <div class="controls">
                <h3>⌨️ 控制方式</h3>
                <p><strong>移动:</strong> W/A/S/D 或方向键</p>
                <p><strong>射击:</strong> 空格键 或 J键</p>
                <p><strong>重新开始:</strong> R 键</p>
            </div>

            <div class="info-section">
                <h3>📋 规则说明</h3>
                <p>🟩 绿色方块 = 玩家坦克</p>
                <p>🟫 灰色方块 = 敌方坦克</p>
                <p>🧱 砖墙 = 可摧毁</p>
                <p>⬜ 钢铁墙 = 不可摧毁</p>
                <p>💧 河流 = 无法通过</p>
            </div>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const CANVAS_WIDTH = 520;
        const CANVAS_HEIGHT = 520;
        const GRID_SIZE = 40;
        const GRID_COUNT = CANVAS_WIDTH / GRID_SIZE; // 13x13

        const TILE_TYPES = {
            EMPTY: 0,
            BRICK: 1,
            STEEL: 2,
            WATER: 3,
            FOREST: 4
        };

        const DIRECTIONS = {
            UP: 0,
            RIGHT: 1,
            DOWN: 2,
            LEFT: 3
        };

        // ==================== 全局变量 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameState = {
            level: 1,
            playerLife: 3,
            score: 0,
            gameOver: false,
            victory: false,
            isPaused: false
        };

        let gameMap = [];
        let playerTank = null;
        let enemyTanks = [];
        let bullets = [];
        let explosions = [];
        let keys = {};

        // ==================== 地图初始化 ====================
        function initMap(level) {
            gameMap = Array(GRID_COUNT).fill(null).map(() => Array(GRID_COUNT).fill(TILE_TYPES.EMPTY));

            // 绘制地图边界（钢铁墙）
            for (let i = 0; i < GRID_COUNT; i++) {
                gameMap[0][i] = TILE_TYPES.STEEL;
                gameMap[GRID_COUNT - 1][i] = TILE_TYPES.STEEL;
                gameMap[i][0] = TILE_TYPES.STEEL;
                gameMap[i][GRID_COUNT - 1] = TILE_TYPES.STEEL;
            }

            // 根据关卡生成随机障碍物
            const obstacleCount = 15 + level * 2;
            for (let i = 0; i < obstacleCount; i++) {
                let x, y;
                do {
                    x = Math.floor(Math.random() * (GRID_COUNT - 4)) + 2;
                    y = Math.floor(Math.random() * (GRID_COUNT - 4)) + 2;
                } while (gameMap[y][x] !== TILE_TYPES.EMPTY || (x < 4 && y < 4));

                const rand = Math.random();
                if (rand < 0.6) gameMap[y][x] = TILE_TYPES.BRICK;
                else if (rand < 0.8) gameMap[y][x] = TILE_TYPES.STEEL;
                else gameMap[y][x] = TILE_TYPES.WATER;
            }

            // 留出玩家出生点（左下角）
            for (let x = 1; x < 3; x++) {
                for (let y = GRID_COUNT - 3; y < GRID_COUNT - 1; y++) {
                    gameMap[y][x] = TILE_TYPES.EMPTY;
                }
            }

            // 留出敌人出生区域（右上角）
            for (let x = GRID_COUNT - 3; x < GRID_COUNT - 1; x++) {
                for (let y = 1; y < 3; y++) {
                    gameMap[y][x] = TILE_TYPES.EMPTY;
                }
            }
        }

        // ==================== 坦克类 ====================
        class Tank {
            constructor(x, y, direction, isPlayer = false) {
                this.x = x * GRID_SIZE;
                this.y = y * GRID_SIZE;
                this.direction = direction;
                this.isPlayer = isPlayer;
                this.width = GRID_SIZE;
                this.height = GRID_SIZE;
                this.speed = 1.5;
                this.shootCooldown = 0;
                this.shootInterval = 30; // 帧
                this.alive = true;
                this.color = isPlayer ? '#4CAF50' : '#999';
                this.vx = 0;
                this.vy = 0;
                this.updateVelocity();
            }

            updateVelocity() {
                this.vx = 0;
                this.vy = 0;
                switch (this.direction) {
                    case DIRECTIONS.UP: this.vy = -this.speed; break;
                    case DIRECTIONS.DOWN: this.vy = this.speed; break;
                    case DIRECTIONS.LEFT: this.vx = -this.speed; break;
                    case DIRECTIONS.RIGHT: this.vx = this.speed; break;
                }
            }

            move() {
                const nextX = this.x + this.vx;
                const nextY = this.y + this.vy;

                if (this.canMoveTo(nextX, nextY)) {
                    this.x = nextX;
                    this.y = nextY;
                }
            }

            canMoveTo(x, y) {
                // 检查边界
                if (x < 0 || y < 0 || x + this.width > CANVAS_WIDTH || y + this.height > CANVAS_HEIGHT) {
                    return false;
                }

                // 检查碰撞的网格单元
                const gridX1 = Math.floor(x / GRID_SIZE);
                const gridY1 = Math.floor(y / GRID_SIZE);
                const gridX2 = Math.floor((x + this.width - 1) / GRID_SIZE);
                const gridY2 = Math.floor((y + this.height - 1) / GRID_SIZE);

                for (let gy = gridY1; gy <= gridY2; gy++) {
                    for (let gx = gridX1; gx <= gridX2; gx++) {
                        if (gy < 0 || gy >= GRID_COUNT || gx < 0 || gx >= GRID_COUNT) return false;
                        const tile = gameMap[gy][gx];
                        if (tile !== TILE_TYPES.EMPTY && tile !== TILE_TYPES.FOREST) {
                            return false;
                        }
                    }
                }

                // 检查与其他坦克的碰撞
                const allTanks = [playerTank, ...enemyTanks].filter(t => t && t.alive && t !== this);
                for (let tank of allTanks) {
                    if (this.isCollidingWith(tank, x, y)) {
                        return false;
                    }
                }

                return true;
            }

            isCollidingWith(other, x = this.x, y = this.y) {
                return x < other.x + other.width &&
                       x + this.width > other.x &&
                       y < other.y + other.height &&
                       y + this.height > other.y;
            }

            shoot() {
                if (this.shootCooldown <= 0) {
                    const bulletX = this.x + this.width / 2;
                    const bulletY = this.y + this.height / 2;
                    bullets.push(new Bullet(bulletX, bulletY, this.direction, this.isPlayer));
                    this.shootCooldown = this.shootInterval;
                }
            }

            update() {
                if (this.shootCooldown > 0) {
                    this.shootCooldown--;
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x + 2, this.y + 2, this.width - 4, this.height - 4);

                // 绘制炮塔方向
                ctx.fillStyle = this.isPlayer ? '#66BB6A' : '#aaa';
                let barrelX = this.x + this.width / 2;
                let barrelY = this.y + this.height / 2;
                let barrelLength = 12;

                switch (this.direction) {
                    case DIRECTIONS.UP:
                        ctx.fillRect(barrelX - 2, barrelY - barrelLength, 4, barrelLength);
                        break;
                    case DIRECTIONS.DOWN:
                        ctx.fillRect(barrelX - 2, barrelY, 4, barrelLength);
                        break;
                    case DIRECTIONS.LEFT:
                        ctx.fillRect(barrelX - barrelLength, barrelY - 2, barrelLength, 4);
                        break;
                    case DIRECTIONS.RIGHT:
                        ctx.fillRect(barrelX, barrelY - 2, barrelLength, 4);
                        break;
                }
            }
        }

        // ==================== 子弹类 ====================
        class Bullet {
            constructor(x, y, direction, isPlayer = false) {
                this.x = x;
                this.y = y;
                this.direction = direction;
                this.isPlayer = isPlayer;
                this.speed = 3;
                this.size = 4;
                this.vx = 0;
                this.vy = 0;
                this.updateVelocity();
            }

            updateVelocity() {
                switch (this.direction) {
                    case DIRECTIONS.UP: this.vy = -this.speed; this.vx = 0; break;
                    case DIRECTIONS.DOWN: this.vy = this.speed; this.vx = 0; break;
                    case DIRECTIONS.LEFT: this.vx = -this.speed; this.vy = 0; break;
                    case DIRECTIONS.RIGHT: this.vx = this.speed; this.vy = 0; break;
                }
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
            }

            isOutOfBounds() {
                return this.x < 0 || this.x > CANVAS_WIDTH || this.y < 0 || this.y > CANVAS_HEIGHT;
            }

            draw() {
                ctx.fillStyle = this.isPlayer ? '#FFD700' : '#FF6B6B';
                ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
            }
        }

        // ==================== 爆炸类 ====================
        class Explosion {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 5;
                this.maxRadius = 20;
                this.speed = 1;
                this.finished = false;
            }

            update() {
                this.radius += this.speed;
                if (this.radius >= this.maxRadius) {
                    this.finished = true;
                }
            }

            draw() {
                const opacity = 1 - (this.radius / this.maxRadius);
                ctx.fillStyle = `rgba(255, 100, 0, ${opacity * 0.8})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = `rgba(255, 200, 0, ${opacity})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // ==================== 碰撞检测 ====================
        function checkBulletCollisions() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];

                // 检查子弹与地图碰撞
                const gridX = Math.floor(bullet.x / GRID_SIZE);
                const gridY = Math.floor(bullet.y / GRID_SIZE);

                if (gridX >= 0 && gridX < GRID_COUNT && gridY >= 0 && gridY < GRID_COUNT) {
                    const tile = gameMap[gridY][gridX];

                    if (tile === TILE_TYPES.BRICK) {
                        gameMap[gridY][gridX] = TILE_TYPES.EMPTY;
                        bullets.splice(i, 1);
                        explosions.push(new Explosion(bullet.x, bullet.y));
                        continue;
                    }

                    if (tile === TILE_TYPES.STEEL) {
                        bullets.splice(i, 1);
                        explosions.push(new Explosion(bullet.x, bullet.y));
                        continue;
                    }

                    if (tile === TILE_TYPES.WATER) {
                        continue; // 子弹可以通过水
                    }
                }

                // 检查子弹与坦克碰撞
                if (playerTank && playerTank.alive) {
                    if (!bullet.isPlayer && bullet.x < playerTank.x + playerTank.width &&
                        bullet.x > playerTank.x &&
                        bullet.y < playerTank.y + playerTank.height &&
                        bullet.y > playerTank.y) {
                        playerTank.alive = false;
                        gameState.playerLife--;
                        bullets.splice(i, 1);
                        explosions.push(new Explosion(playerTank.x + playerTank.width / 2, playerTank.y + playerTank.height / 2));
                        continue;
                    }
                }

                // 检查玩家子弹与敌坦克碰撞
                if (bullet.isPlayer) {
                    for (let j = 0; j < enemyTanks.length; j++) {
                        const enemy = enemyTanks[j];
                        if (enemy.alive && bullet.x < enemy.x + enemy.width &&
                            bullet.x > enemy.x &&
                            bullet.y < enemy.y + enemy.height &&
                            bullet.y > enemy.y) {
                            enemy.alive = false;
                            gameState.score++;
                            bullets.splice(i, 1);
                            explosions.push(new Explosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2));
                            break;
                        }
                    }
                    continue;
                }

                // 子弹与子弹碰撞（相互抵消）
                if (!bullet.isPlayer) {
                    for (let j = 0; j < bullets.length; j++) {
                        if (i !== j && bullets[j] && bullets[j].isPlayer) {
                            const other = bullets[j];
                            if (Math.abs(bullet.x - other.x) < 8 && Math.abs(bullet.y - other.y) < 8) {
                                bullets.splice(i, 1);
                                bullets.splice(j, 1);
                                explosions.push(new Explosion(bullet.x, bullet.y));
                                break;
                            }
                        }
                    }
                }

                // 检查子弹是否超出边界
                if (bullet.isOutOfBounds()) {
                    bullets.splice(i, 1);
                }
            }
        }

        // ==================== 敌坦克 AI ====================
        function updateEnemyAI(enemy) {
            if (!enemy.alive) return;

            // 随机改变方向
            if (Math.random() < 0.02) {
                enemy.direction = Math.floor(Math.random() * 4);
                enemy.updateVelocity();
            }

            // 尝试移动
            enemy.move();

            // 随机射击
            if (Math.random() < 0.01) {
                enemy.shoot();
            }

            // 简单追踪玩家
            if (playerTank && playerTank.alive && Math.random() < 0.005) {
                const dx = playerTank.x - enemy.x;
                const dy = playerTank.y - enemy.y;

                if (Math.abs(dx) > Math.abs(dy)) {
                    enemy.direction = dx > 0 ? DIRECTIONS.RIGHT : DIRECTIONS.LEFT;
                } else {
                    enemy.direction = dy > 0 ? DIRECTIONS.DOWN : DIRECTIONS.UP;
                }
                enemy.updateVelocity();
            }
        }

        // ==================== 游戏初始化 ====================
        function initGame() {
            initMap(gameState.level);
            gameState.gameOver = false;
            gameState.victory = false;
            gameState.playerLife = 3;
            gameState.score = 0;
            playerTank = new Tank(1, GRID_COUNT - 2, DIRECTIONS.UP, true);
            enemyTanks = [];
            bullets = [];
            explosions = [];

            // 生成敌坦克
            const enemyCount = Math.min(3 + gameState.level, 5);
            for (let i = 0; i < enemyCount; i++) {
                const x = GRID_COUNT - 2 - (i % 2);
                const y = 1 + Math.floor(i / 2);
                enemyTanks.push(new Tank(x, y, DIRECTIONS.DOWN, false));
            }
        }

        // ==================== 事件处理 ====================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                if (gameState.gameOver || gameState.victory) {
                    gameState.level = 1;
                    initGame();
                }
                return;
            }

            if (['w', 'W', 'a', 'A', 's', 'S', 'd', 'D', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'j', 'J'].includes(e.key)) {
                e.preventDefault();
                keys[e.key.toLowerCase()] = true;

                if (playerTank && playerTank.alive) {
                    if (e.key === ' ' || e.key.toLowerCase() === 'j') {
                        playerTank.shoot();
                    }
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // ==================== 玩家控制 ====================
        function handlePlayerInput() {
            if (!playerTank || !playerTank.alive) return;

            const prevDir = playerTank.direction;

            if (keys['w'] || keys['arrowup']) {
                playerTank.direction = DIRECTIONS.UP;
            } else if (keys['s'] || keys['arrowdown']) {
                playerTank.direction = DIRECTIONS.DOWN;
            } else if (keys['a'] || keys['arrowleft']) {
                playerTank.direction = DIRECTIONS.LEFT;
            } else if (keys['d'] || keys['arrowright']) {
                playerTank.direction = DIRECTIONS.RIGHT;
            }

            if (playerTank.direction !== prevDir) {
                playerTank.updateVelocity();
            }

            playerTank.move();
        }

        // ==================== 游戏更新 ====================
        function update() {
            if (gameState.gameOver || gameState.victory) return;

            handlePlayerInput();

            if (playerTank && playerTank.alive) {
                playerTank.update();
            } else if (gameState.playerLife <= 0) {
                gameState.gameOver = true;
                updateStatus();
            }

            // 更新敌坦克
            for (let enemy of enemyTanks) {
                if (enemy.alive) {
                    updateEnemyAI(enemy);
                    enemy.update();
                }
            }

            // 更新子弹
            for (let bullet of bullets) {
                bullet.update();
            }

            // 检查碰撞
            checkBulletCollisions();

            // 更新爆炸
            for (let i = explosions.length - 1; i >= 0; i--) {
                explosions[i].update();
                if (explosions[i].finished) {
                    explosions.splice(i, 1);
                }
            }

            // 清理死亡的子弹和坦克
            bullets = bullets.filter(b => !b.isOutOfBounds());
            enemyTanks = enemyTanks.filter(t => t.alive || explosions.length > 0);

            // 检查胜利条件
            if (enemyTanks.every(t => !t.alive)) {
                gameState.victory = true;
                updateStatus();
            }

            // 玩家死亡后重新生成
            if (playerTank && !playerTank.alive && gameState.playerLife > 0) {
                playerTank = new Tank(1, GRID_COUNT - 2, DIRECTIONS.UP, true);
            }
        }

        // ==================== 绘制游戏 ====================
        function draw() {
            // 清空画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // 绘制地图
            for (let y = 0; y < GRID_COUNT; y++) {
                for (let x = 0; x < GRID_COUNT; x++) {
                    const tile = gameMap[y][x];
                    const px = x * GRID_SIZE;
                    const py = y * GRID_SIZE;

                    if (tile === TILE_TYPES.BRICK) {
                        ctx.fillStyle = '#D2691E';
                        ctx.fillRect(px, py, GRID_SIZE, GRID_SIZE);
                    } else if (tile === TILE_TYPES.STEEL) {
                        ctx.fillStyle = '#808080';
                        ctx.fillRect(px, py, GRID_SIZE, GRID_SIZE);
                    } else if (tile === TILE_TYPES.WATER) {
                        ctx.fillStyle = '#4A90E2';
                        ctx.fillRect(px, py, GRID_SIZE, GRID_SIZE);
                        ctx.strokeStyle = '#2E5C8A';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(px, py, GRID_SIZE, GRID_SIZE);
                    } else if (tile === TILE_TYPES.FOREST) {
                        ctx.fillStyle = 'rgba(76, 175, 80, 0.3)';
                        ctx.fillRect(px, py, GRID_SIZE, GRID_SIZE);
                    }
                }
            }

            // 绘制坦克
            if (playerTank && playerTank.alive) {
                playerTank.draw();
            }

            for (let enemy of enemyTanks) {
                if (enemy.alive) {
                    enemy.draw();
                }
            }

            // 绘制子弹
            for (let bullet of bullets) {
                bullet.draw();
            }

            // 绘制爆炸
            for (let explosion of explosions) {
                explosion.draw();
            }
        }

        // ==================== 更新 UI ====================
        function updateUI() {
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('life').textContent = Math.max(0, gameState.playerLife);
            document.getElementById('score').textContent = `${gameState.score}/${Math.min(3 + gameState.level, 5)}`;
            document.getElementById('enemies').textContent = enemyTanks.filter(t => t.alive).length;
        }

        function updateStatus() {
            const statusEl = document.getElementById('status');
            if (gameState.victory) {
                statusEl.textContent = '🎉 胜利！按 R 继续';
                statusEl.className = 'status victory';
                gameState.level++;
            } else if (gameState.gameOver) {
                statusEl.textContent = '💀 游戏结束！按 R 重新开始';
                statusEl.className = 'status gameover';
            } else {
                statusEl.textContent = '进行中';
                statusEl.className = 'status playing';
            }
        }

        // ==================== 游戏循环 ====================
        function gameLoop() {
            update();
            draw();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        // 游戏开始
        initGame();
        gameLoop();
    </script>
</body>
</html>
